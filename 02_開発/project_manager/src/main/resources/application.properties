spring.application.name=project_manager

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/project_manager
spring.datasource.username=app_user
spring.datasource.password=app_user
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis
mybatis.mapper-locations=classpath*:repository/**/*.xml
mybatis.type-aliases-package=com.tksystem.project_manager
mybatis.configuration.map-underscore-to-camel-case=true

# Optional: log executed SQL
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

